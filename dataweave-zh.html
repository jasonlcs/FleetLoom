<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DataWeave</title>
<style>
:root {
  --bg: #f8f9fb;
  --surface: #fff;
  --surface2: #f0f1f4;
  --border: #e2e5ea;
  --text: #212529;
  --text2: #5f6b7a;
  --text3: #8b95a5;
  --accent: #3b6df0;
  --accent-hover: #2b5cdb;
  --accent-bg: #edf2fd;
  --red: #e5484d;
  --green: #30a46c;
  --amber: #f5a623;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,.1);
  --radius: 8px;
  --radius-sm: 5px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mono: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "DejaVu Sans Mono", monospace;
  --transition: 150ms ease;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111318;
    --surface: #1a1d23;
    --surface2: #21242c;
    --border: #2d3139;
    --text: #e1e4e8;
    --text2: #8b949e;
    --text3: #5d6570;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --accent-bg: #0d2847;
    --red: #f85149;
    --green: #3fb950;
    --amber: #d29922;
    --shadow: 0 1px 3px rgba(0,0,0,.3), 0 1px 2px rgba(0,0,0,.2);
    --shadow-lg: 0 4px 16px rgba(0,0,0,.4);
  }
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: var(--font); font-size: 13px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Toolbar ── */
#toolbar {
  height: 42px; min-height: 42px; display: flex; align-items: center;
  padding: 0 12px; gap: 10px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  z-index: 100; position: relative;
}
#brand {
  font-size: 15px; font-weight: 700; color: var(--accent);
  letter-spacing: -0.3px; user-select: none; margin-right: 6px;
}
#brand span { font-weight: 400; color: var(--text2); }

.toolbar-spacer { flex: 1; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: var(--radius-sm); font-size: 12px;
  font-family: var(--font); font-weight: 500; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); transition: all var(--transition);
  white-space: nowrap; user-select: none;
}
.btn:hover { background: var(--surface2); color: var(--text); border-color: var(--text3); }
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--accent); color: #fff; border-color: var(--accent);
  font-weight: 600; padding: 6px 16px; font-size: 13px;
}
.btn-primary:hover { background: var(--accent-hover); color: #fff; border-color: var(--accent-hover); }

.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface2); }

.btn-xs { padding: 3px 7px; font-size: 11px; gap: 2px; }
.btn-icon { padding: 5px; line-height: 1; }

.toolbar-div { width: 1px; height: 20px; background: var(--border); }

.toggle {
  display: inline-flex; align-items: center; gap: 4px; cursor: pointer;
  font-size: 11.5px; color: var(--text2); user-select: none;
  padding: 4px 8px; border-radius: var(--radius-sm); transition: background var(--transition);
}
.toggle:hover { background: var(--surface2); }
.toggle input { accent-color: var(--accent); }

/* ── Main Layout ── */
#main {
  display: flex; flex-direction: column;
  height: calc(100% - 42px);
}

.panel-wrap {
  position: relative; overflow: hidden;
  flex: 1 1 0; min-height: 80px;
  display: flex; flex-direction: column;
  background: var(--surface);
}

.panel-header {
  height: 30px; min-height: 30px; display: flex; align-items: center;
  padding: 0 10px; gap: 4px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  user-select: none; font-size: 11px; font-weight: 600; color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
}

.panel-header .title {
  margin-right: auto; color: var(--text3);
}

.panel-header .badge {
  background: var(--accent-bg); color: var(--accent); font-size: 10px;
  padding: 1px 6px; border-radius: 10px; font-weight: 600;
}

.panel-body {
  flex: 1; position: relative; overflow: hidden;
}

.panel-body textarea {
  width: 100%; height: 100%; display: block;
  border: none; outline: none; padding: 12px 16px;
  font-family: var(--mono); font-size: 12.5px; line-height: 1.55;
  background: var(--surface); color: var(--text);
  resize: none; tab-size: 2;
}
.panel-body textarea::placeholder { color: var(--text3); }
.panel-body textarea:focus { background: var(--bg); }

/* ── Separators (inline) ── */
.separators {
  position: absolute; bottom: 6px; right: 10px; z-index: 10;
  display: flex; align-items: center; gap: 6px;
  padding: 4px 8px; border-radius: var(--radius-sm);
  background: var(--surface2); border: 1px solid var(--border);
  font-size: 10.5px; color: var(--text2); opacity: 0.7;
  transition: opacity var(--transition);
}
.separators:hover, .separators:focus-within { opacity: 1; }
.separators input {
  width: 48px; border: 1px solid var(--border); border-radius: 3px;
  padding: 2px 5px; font-family: var(--mono); font-size: 11px;
  background: var(--surface); color: var(--text); outline: none;
  text-align: center;
}
.separators input:focus { border-color: var(--accent); }
.separators input.error { border-color: var(--red); background: rgba(229,72,77,.08); }
.separators label { display: flex; align-items: center; gap: 2px; cursor: pointer; }
.separators label input { width: auto; accent-color: var(--accent); }
.separators label.csv-label { font-weight: 600; color: var(--accent); }

/* ── Resize handles ── */
.resize-handle {
  height: 4px; min-height: 4px; flex-shrink: 0;
  background: var(--border); cursor: ns-resize;
  transition: background var(--transition);
  position: relative; z-index: 10;
}
.resize-handle::after {
  content: ''; position: absolute; top: -3px; left: 0; right: 0; bottom: -3px;
}
.resize-handle:hover, .resize-handle:active { background: var(--accent); }

/* ── Results dashboard ── */
.dashboard {
  height: 44px; min-height: 44px; display: flex; align-items: center;
  padding: 0 10px; gap: 8px;
  background: var(--surface2); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* ── Select ── */
select {
  padding: 4px 8px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 11.5px; font-family: var(--font);
  cursor: pointer; outline: none; max-width: 200px;
}
select:focus { border-color: var(--accent); }

/* ── Overlay / Modal ── */
.overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.5); z-index: 10000;
  display: flex; align-items: center; justify-content: center;
  animation: fadeIn 120ms ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--surface); border-radius: var(--radius);
  max-width: 720px; width: 94%; max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow-lg); border: 1px solid var(--border);
  animation: slideUp 150ms ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } }

.modal-header {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-header h2 { font-size: 14px; font-weight: 600; margin-right: auto; }
.modal-close {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--text2); font-size: 18px;
  cursor: pointer; border-radius: var(--radius-sm); transition: background var(--transition);
}
.modal-close:hover { background: var(--surface2); }

.modal-body { overflow-y: auto; padding: 16px; flex: 1; }
.modal-body h3 { font-size: 12.5px; color: var(--accent); margin: 0 0 6px; }
.modal-body h4 { font-size: 11.5px; margin: 14px 0 4px; color: var(--text2); }
.modal-body table { width: 100%; border-collapse: collapse; font-size: 12px; margin: 4px 0 12px; }
.modal-body td { padding: 3px 8px; border-bottom: 1px solid var(--border); vertical-align: top; }
.modal-body td:first-child { font-family: var(--mono); white-space: nowrap; font-weight: 600; color: var(--accent); width: 1%; padding-right: 14px; }
.modal-body td:nth-child(2) { color: var(--text2); }
.modal-body code {
  background: var(--accent-bg); padding: 1px 5px; border-radius: 3px;
  font-family: var(--mono); font-size: 0.93em;
}
.modal-body pre {
  background: var(--bg); padding: 10px 14px; border-radius: var(--radius-sm);
  overflow-x: auto; font-family: var(--mono); font-size: 11.5px;
  margin: 4px 0 10px; line-height: 1.5; border: 1px solid var(--border);
}

.modal-footer {
  padding: 10px 16px; border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text3); text-align: center; flex-shrink: 0;
}

/* ── Help tabs ── */
.help-tabs {
  display: flex; border-bottom: 1px solid var(--border);
  padding: 0 16px; flex-shrink: 0;
}
.help-tab {
  padding: 8px 14px; cursor: pointer; border: none; background: none;
  color: var(--text2); font-size: 12px; font-family: var(--font);
  border-bottom: 2px solid transparent; transition: all var(--transition);
}
.help-tab:hover { color: var(--text); }
.help-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ── Snippet list ── */
.snippet-item {
  display: flex; align-items: flex-start; padding: 8px 10px;
  border-radius: var(--radius-sm); cursor: pointer;
  border: 1px solid transparent; transition: all var(--transition);
  margin: 1px 0;
}
.snippet-item:hover { background: var(--surface2); border-color: var(--border); }
.snippet-item .name { font-weight: 600; font-size: 12px; }
.snippet-item .preview { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.snippet-item .date { font-size: 10.5px; color: var(--text3); margin-top: 1px; }
.snippet-del {
  flex-shrink: 0; width: 22px; height: 22px; display: flex; align-items: center; justify-content: center;
  border: none; background: none; color: var(--text3); font-size: 16px;
  cursor: pointer; border-radius: var(--radius-sm); opacity: 0; transition: opacity var(--transition);
}
.snippet-item:hover .snippet-del { opacity: 1; }
.snippet-del:hover { background: var(--red); color: #fff; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <span id="brand">DataWeave <span>· 文字處理工具</span></span>
  <div class="toolbar-div"></div>
  <button class="btn btn-primary" onclick="go();" title="計算 (F5)">▶ 計算</button>
  <label class="toggle"><input type="checkbox" id="chkAuto" checked onchange="setauto();">auto</label>
  <label class="toggle"><input type="checkbox" id="chkFilter" onchange="toggleFilter();">篩選</label>
  <label class="toggle"><input type="checkbox" id="chkCollapse" onchange="toggleCollapse();">摺疊</label>
  <div class="toolbar-div"></div>
  <select id="selectSnippet" onchange="insertsnippet(this);">
    <option value="">插入片段…</option>
    <option value="$rownum">列號（從0起）</option>
    <option value="$rownumOne">列號（從1起）</option>
    <option value="$row">整列原始內容</option>
    <option value="$numrows">總列數</option>
    <option value="<% $0.toUpperCase() %>">全部大寫 TO UPPER CASE</option>
    <option value="<% $0.toLowerCase() %>">全部小寫 to lower case</option>
    <option value="<% $0.toPascalCase() %>">帕斯卡 ToPascalCase</option>
    <option value="<% $0.toCamelCase() %>">駝峰 toCamelCase</option>
    <option value="<% $0.toSentenceCase() %>">句首大寫 To sentence case</option>
    <option value="<% $0.toSnakeCase() %>">蛇形 to_snake_case</option>
    <option value="<% $0.toKebabCase() %>">烤肉串 to-kebab-case</option>
    <option value="<% $0.toTitleCase() %>">標題 To Title Case</option>
    <option value="<% $0.toWords() %>">拆字 To Words</option>
    <option value="<% $0.reverse() %>">反轉 Reverse</option>
    <option value="<% if ($rownum != 0) { 'AND '; } else {'    '} %>">條件：第一列除外</option>
    <option value="<% if ($rownumOne != $numrows) { ','; } %>">條件：最後列除外</option>
    <option value="$ONCE<ul>&#10;$EACH  <li>$row</li>&#10;$ONCE</ul>">HTML 無序列表</option>
    <option value="$ONCE<table>&#10;$EACH  <tr><td>$row</td></tr>&#10;$ONCE</table>">HTML 表格</option>
    <option value="$ONCE<table>&#10; <thead><tr><th>$0</th><th>$1</th></tr></thead>&#10; <tbody>&#10;$EACH+  <tr><td>$0</td><td>$1</td></tr>&#10;$ONCE </tbody>&#10;</table>">HTML 表格（含標題）</option>
  </select>
  <div class="toolbar-spacer"></div>
  
  <button class="btn btn-ghost btn-xs" onclick="saveSnippet();" id="btnSaveSnippet" title="儲存 pattern">💾 儲存</button>
  <button class="btn btn-ghost btn-xs" onclick="showSnippets();" title="載入 pattern">📂 載入</button>
  <button class="btn btn-ghost btn-xs" onclick="downloadResult();" title="下載結果">⤓ 下載</button>
  <button class="btn btn-ghost btn-xs" onclick="exportProject();" title="匯出專案 (JSON)">📤 匯出</button>
  <button class="btn btn-ghost btn-xs" onclick="$('importFile').click();" title="匯入專案 (JSON)">📥 匯入</button>
  <input type="file" id="importFile" accept=".json" onchange="importProject(this);" style="display:none">
  <button class="btn btn-ghost btn-xs" onclick="clearDefault();" title="清除全部">✕ 清除</button>
  <button class="btn btn-ghost btn-icon" onclick="showHelp();" title="使用說明">?</button>
</div>

<!-- ── Main Panels ── -->
<div id="main">
  <!-- Data -->
  <div class="panel-wrap" id="dataPanel">
    <div class="panel-header">
      <span class="title">DATA</span>
      <span class="badge" id="statsData"></span>
      <a class="btn btn-ghost btn-xs" onclick="sortData();" title="A→Z 排序">↓↑ 排序</a>
      <a class="btn btn-ghost btn-xs" onclick="sortDataByCol();" title="指定欄位排序">↓ 欄排序</a>
      <a class="btn btn-ghost btn-xs" onclick="invertData();" title="反轉順序">↕ 反轉</a>
      <a class="btn btn-ghost btn-xs" onclick="shuffleData();" title="隨機排列">⟳ 隨機</a>
      <a class="btn btn-ghost btn-xs" onclick="removeDataDuplicates();" title="移除重複列">⊜ 去重</a>
    </div>
    <div class="panel-body">
      <textarea id="txtData" oninput="auto();" spellcheck="false"></textarea>
       <div class="separators">
        <span>Col</span>
        <input type="text" value="," id="fieldDelim" oninput="auto();" spellcheck="false" title="Use \t for tab">
        <label title="Regex"><input type="checkbox" id="chkColRegex" onchange="setColumnDelimiterIsRegex(this.checked);">rx</label>
        <label title="CSV mode (RFC 4180)"><input type="checkbox" id="chkCsvMode" onchange="setCsvMode(this.checked);">CSV</label>
        <span>Row</span>
        <input type="text" value="\n" id="rowDelim" oninput="auto();" spellcheck="false" title="Use \r\n for Windows, \n for Unix">
        <label title="Regex"><input type="checkbox" id="chkRowRegex" onchange="setRowDelimiterIsRegex(this.checked);">rx</label>
      </div>
    </div>
  </div>

  <div class="resize-handle" id="handle1"></div>

  <!-- Filter -->
  <div class="panel-wrap" id="filterPanel" style="display:none">
    <div class="panel-header"><span class="title">篩選 (WHERE)</span></div>
    <div class="panel-body">
      <textarea id="txtFilter" oninput="auto();" spellcheck="false" placeholder="$rowNum > 0 && $2 == 'guitar'"></textarea>
    </div>
  </div>

  <!-- Pattern -->
  <div class="panel-wrap" id="patternPanel">
    <div class="panel-header"><span class="title">PATTERN</span></div>
    <div class="panel-body">
      <textarea id="txtPattern" oninput="auto();" spellcheck="false"></textarea>
    </div>
  </div>

  <div class="resize-handle" id="handle2"></div>

  <!-- Results -->
  <div class="panel-wrap" id="resultsPanel">
    <div class="dashboard">
      <span class="badge" id="statsResults" style="margin-right:auto;"></span>
      <a class="btn btn-ghost btn-xs" onclick="sortResult();" title="A→Z 排序">↓↑ 排序</a>
      <a class="btn btn-ghost btn-xs" onclick="sortResultByCol();" title="指定欄位排序">↓ 欄排序</a>
      <a class="btn btn-ghost btn-xs" onclick="invertResult();" title="反轉順序">↕ 反轉</a>
      <a class="btn btn-ghost btn-xs" onclick="shuffleResult();" title="隨機排列">⟳ 隨機</a>
      <a class="btn btn-ghost btn-xs" onclick="removeResultDuplicates();" title="移除重複列">⊜ 去重</a>
      <a class="btn btn-ghost btn-xs" onclick="copyResult();" id="copyBtn" title="複製到剪貼簿">📋 複製</a>
    </div>
    <div class="panel-body">
      <textarea id="txtResults" spellcheck="false" readonly></textarea>
    </div>
  </div>
</div>

<script>
// ── Global state ──
var trimFields = true;
var ignoreEmptyFields = false;
var addLineSep = true;
var ignoreEmptyRows = true;
var autoPreview = true;
var columnDelimiterIsRegex = false;
var rowDelimiterIsRegex = false;
var csvMode = false;
var isFiltering = false;
var collapseMode = false;
var ready = false;
var autoCalculationInProgress = false;
var _debounceTimer = 0;
var currentLang = "zh";

var defaultText = "Lumbergh, Bill, Initech\nWaddams, Milton, Initech\nGibbons, Peter, Initech\nBolton, Michael, Initech";
var defaultPattern = "To: $1.$0@$2.com\nHello $1 $0,\nI'm sorry to inform you of a terrible accident at $2.\n---";

// ── L10N ──
var L10N={zh:{brand:'DataWeave',subtitle:'文字處理工具',calc:'▶ 計算',calcTitle:'計算 (F5)',
auto:'auto',filter:'篩選',collapse:'摺疊',snippetPlaceholder:'插入片段…',
saveBtn:'💾 儲存',saveTitle:'儲存 pattern',loadBtn:'📂 載入',loadTitle:'載入 pattern',
shareBtn:'🔗 分享',shareTitle:'複製分享連結',downloadBtn:'⤓ 下載',downloadTitle:'下載結果',
clearBtn:'✕ 清除',clearTitle:'清除全部',
dataHeader:'DATA',filterHeader:'篩選 (WHERE)',patternHeader:'PATTERN',
sortTitle:'A→Z 排序',colSortTitle:'指定欄位排序',invertTitle:'反轉順序',shuffleTitle:'隨機排列',dedupTitle:'移除重複列',
sortLabel:'↓↑ 排序',colSortLabel:'↓ 欄排序',invertLabel:'↕ 反轉',shuffleLabel:'⟳ 隨機',dedupLabel:'⊜ 去重',
copyLabel:'📋 複製',copyTitle:'複製到剪貼簿',copiedLabel:'✅ 已複製',
colLabel:'Col',rowLabel:'Row',regexLabel:'rx',regexTitle:'正則表達式',
myPatterns:'── 我的 Patterns ──',snippetRowNum:'列號（從0起）',snippetRowNumOne:'列號（從1起）',snippetRow:'整列原始內容',snippetNumRows:'總列數',
snippetUpper:'全部大寫 TO UPPER CASE',snippetLower:'全部小寫 to lower case',snippetPascal:'帕斯卡 ToPascalCase',snippetCamel:'駝峰 toCamelCase',
snippetSentence:'句首大寫 To sentence case',snippetSnake:'蛇形 to_snake_case',snippetKebab:'烤肉串 to-kebab-case',snippetTitle:'標題 To Title Case',
snippetWords:'拆字 To Words',snippetReverse:'反轉 Reverse',snippetCondFirst:'條件：第一列除外',snippetCondLast:'條件：最後列除外',
snippetHtmlUl:'HTML 無序列表',snippetHtmlTable:'HTML 表格',snippetHtmlTableHdr:'HTML 表格（含標題）',
sortPrompt:'依第幾欄排序（從 0 起算）：',
savePrompt:'為這個 pattern 命名：',saveEmpty:'Pattern 為空。',noSnippets:'尚無已儲存的 pattern。點擊 💾 儲存 來新增。',
delConfirm:'確定刪除這個 pattern？',copied:'連結已複製！',copyPrompt:'複製連結：',
savedPatterns:'已儲存的 Pattern',savedFooter:' 個 pattern 已存於瀏覽器',helpTitle:'使用說明',
langLabel:'中',langTitle:'正體中文'}};

function t(key){return L10N[currentLang]&&L10N[currentLang][key]||L10N['en'][key]||key;}

function applyL10N(){
  var L=L10N[currentLang];
  // Toolbar
  var d=document;
  var brand=d.querySelector('#brand');if(brand)brand.innerHTML=L.brand+' <span>· '+L.subtitle+'</span>';
  var calc=d.getElementById('calc_button');if(calc){calc.value=L.calc;calc.title=L.calcTitle;}
  var sel=d.getElementById('selectSnippet');if(sel&&sel.options[0])sel.options[0].textContent=L.snippetPlaceholder;

  if(csvMode){
    csvParsed=parseCSV(data,fieldDelim);
    dataRows=csvParsed.map(function(f){return f.join(fieldDelim);});
    // Warn on inconsistent column counts
    if(csvParsed.length>1){
      var colCount=csvParsed[0].length,inconsistent=false;
      for(var ci=1;ci<csvParsed.length;ci++){if(csvParsed[ci].length!==colCount){inconsistent=true;break;}}
      if(inconsistent)console.warn('CSV: inconsistent column counts detected');
    }
  } else {
    dataRows=splitBy(data,rowDelim,rowDelimiterIsRegex);
  }
  if(ignoreEmptyRows){
    if(csvMode&&csvParsed){
      var cleanRows=[],cleanCSV=[];
      for(var ri=0;ri<dataRows.length;ri++){
        var v=dataRows[ri];
        if(v!==""&&v!==null&&v.trim()!==""){cleanRows.push(v);cleanCSV.push(csvParsed[ri]);}
      }
      dataRows=cleanRows;csvParsed=cleanCSV;
    } else {
      dataRows=dataRows.clean(trimFields);
    }
  }
  var numRows=dataRows.length;
  if(autoPreview&&numRows>1000){autoPreview=false;$('chkAuto').checked=false;}
  if(!autoPreview&&reverseEngineerPattern(pattern,data,$('txtResults').value,dataRows[0]||'',fieldDelim)){outParam.numRows=numRows;return $('txtResults').value;}
  var csvHeaders=csvMode&&csvParsed&&csvParsed.length>0?csvParsed[0]:null;
  if(isFiltering&&filter&&filter.trim()!==''){
    var filteredRows=[],filteredCSV=csvParsed?[]:null,filterCache={};
    var filterPattern='<% '+filter+' %>';
    for(var fi=0;fi<dataRows.length;fi++){
      try{
        var filterCode=apply(filterPattern,dataRows[fi],fieldDelim,fi,numRows,dataRows,rowDelim,pattern,filterCache,csvParsed?csvParsed[fi]:null,csvHeaders);
        var filterFn=new Function('"use strict";return ('+filterCode+')');
        if(filterFn()){filteredRows.push(dataRows[fi]);if(filteredCSV)filteredCSV.push(csvParsed[fi]);}
      }catch(e){}
    }
    dataRows=filteredRows;if(filteredCSV)csvParsed=filteredCSV;
    numRows=dataRows.length;
  }
  showCount("Data",dataRows.length);
  var patterns=pattern.split(eachDelim),resultParts=[],applyCache={};
  for(var iPat=0;iPat<patterns.length;iPat++){
    var start=0,inner=patterns[iPat].split(onceDelim)[0].ltrimCrLf().rtrimCrLf();
    if(inner.length>0){if(inner[0]==='+'){inner=inner.slice(1).ltrimCrLf();start=1;}
      for(var i=start;i<numRows;i++){resultParts.push(apply(inner,dataRows[i],fieldDelim,i,numRows,dataRows,rowDelim,pattern,applyCache,csvParsed?csvParsed[i]:null,csvHeaders));if(addLineSep)resultParts.push('\n');}
    }
    var stopParts=patterns[iPat].split(onceDelim);
    for(var j=1;j<stopParts.length;j++){resultParts.push(apply(stopParts[j].ltrimCrLf(),dataRows[0]||'',fieldDelim,0,numRows,dataRows,rowDelim,pattern,applyCache,csvParsed?csvParsed[0]:null,csvHeaders));}
  }
  var result=resultParts.join('');
  outParam.numRows=numRows;showCount("Results",result.split('\n').clean(true).length);
  return result;
}

// ── MAIN ACTIONS ──
function go(){
  try{
    var rowDelim=interpret($('rowDelim').value),fieldDelim=interpret($('fieldDelim').value);
    var data=$('txtData').value,pattern=$('txtPattern').value;
    $('rowDelim').classList.remove('error');$('fieldDelim').classList.remove('error');
    $('statsData').style.color='';
    if(columnDelimiterIsRegex||rowDelimiterIsRegex){
      try{if(columnDelimiterIsRegex)new RegExp(fieldDelim);if(rowDelimiterIsRegex)new RegExp(rowDelim);}catch(e){
        $('fieldDelim').classList.add('error');$('rowDelim').classList.add('error');
        $('txtResults').value='[Regex Error] '+(e.message||e);return;
      }
    }
    var out={numRows:0},filter=isFiltering?$('txtFilter').value:null;
    $('txtResults').value=calculate(data,pattern,filter,rowDelim,fieldDelim,out);
  }catch(err){console.error(err);}
}

function auto(){
  if(!autoPreview||!ready)return;
  clearTimeout(_debounceTimer);
  _debounceTimer=setTimeout(function(){
    if(autoCalculationInProgress)return;autoCalculationInProgress=true;
    go();
    autoCalculationInProgress=false;
  },150);
}

function setauto(){autoPreview=$('chkAuto').checked;auto();}
function toggleFilter(){isFiltering=$('chkFilter').checked;$('filterPanel').style.display=isFiltering?'flex':'none';auto();}
function toggleCollapse(){
  collapseMode=$('chkCollapse').checked;
  var panels=document.querySelectorAll('.panel-wrap');
  for(var i=0;i<panels.length;i++){
    if(collapseMode&&panels[i].id!=='dataPanel'&&panels[i].id!=='resultsPanel')panels[i].style.display='none';
    else if(panels[i].id==='filterPanel'&&!isFiltering)panels[i].style.display='none';
    else panels[i].style.display='flex';
  }
  auto();
}

// ── SNIPPETS ──
function insertAtCursor(field,value){
  if(field.selectionStart||field.selectionStart===0){var start=field.selectionStart,end=field.selectionEnd;field.value=field.value.slice(0,start)+value+field.value.slice(end);field.selectionStart=field.selectionEnd=start+value.length;field.focus();}
  else field.value+=value;
  auto();
}
function insertsnippet(sel){var v=sel.value;sel.selectedIndex=0;if(!v||v==='NULL'||v==='addYourOwn')return;insertAtCursor($('txtPattern'),v);}

var STORAGE_KEY='dataweave_snippets';
function loadSnippets(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||[];}catch(e){return[];}}
function saveSnippets(list){localStorage.setItem(STORAGE_KEY,JSON.stringify(list));refreshSnippetDropdown();}
function saveSnippet(){
  var pattern=$('txtPattern').value.trim();
  if(!pattern){alert(t('saveEmpty'));return;}
  var name=prompt(t('savePrompt'),pattern.split('\n')[0].slice(0,40));
  if(!name||!name.trim())return;
  var list=loadSnippets();
  list.unshift({name:name.trim(),pattern:pattern,date:new Date().toISOString().slice(0,10)});
  saveSnippets(list);
}
function deleteSnippet(index){if(!confirm(t('delConfirm')))return;var list=loadSnippets();list.splice(index,1);saveSnippets(list);showSnippets();}
function loadSnippetByIndex(index){var list=loadSnippets();if(list[index]){$('txtPattern').value=list[index].pattern;auto();var o=document.getElementById('snippetsOverlay');if(o)o.parentNode.removeChild(o);}}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function showSnippets(){
  var list=loadSnippets();
  if(list.length===0){alert(t('noSnippets'));return;}
  var existing=document.getElementById('snippetsOverlay');if(existing)existing.parentNode.removeChild(existing);
  var overlay=document.createElement('div');overlay.id='snippetsOverlay';overlay.className='overlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.parentNode.removeChild(overlay);};
  var modal=document.createElement('div');modal.className='modal';
  modal.innerHTML='<div class="modal-header"><h2>'+t('savedPatterns')+'</h2><button class="modal-close">&times;</button></div><div class="modal-body" id="snippetList"></div><div class="modal-footer">'+list.length+t('savedFooter')+'</div>';
  overlay.appendChild(modal);document.body.appendChild(overlay);
  modal.querySelector('.modal-close').onclick=function(){overlay.parentNode.removeChild(overlay);};
  var listDiv=document.getElementById('snippetList');
  for(var i=0;i<list.length;i++){(function(idx){
    var item=document.createElement('div');item.className='snippet-item';
    var preview=list[idx].pattern.replace(/\n/g,' ↵ ').slice(0,80);
    var left=document.createElement('div');left.style.cssText='flex:1;min-width:0;';
    left.innerHTML='<div class="name">'+escHtml(list[idx].name)+'</div><div class="preview">'+escHtml(preview)+'</div><div class="date">'+escHtml(list[idx].date||'')+'</div>';
    left.onclick=function(){loadSnippetByIndex(idx);};
    item.appendChild(left);
    var del=document.createElement('button');del.className='snippet-del';del.textContent='×';del.title='Delete';
    del.onclick=function(e){e.stopPropagation();deleteSnippet(idx);};
    item.appendChild(del);listDiv.appendChild(item);
  })(i);}
}

function refreshSnippetDropdown(){
  var sel=$('selectSnippet');
  for(var i=sel.options.length-1;i>=0;i--){if(sel.options[i].className==='custom-snippet')sel.remove(i);}
  var list=loadSnippets();
  if(list.length>0){
    var sep=document.createElement('option');sep.disabled=true;    sep.textContent=t('myPatterns');sep.className='custom-snippet';sel.add(sep);
    for(var i=0;i<list.length;i++){var opt=document.createElement('option');opt.value=list[i].pattern;opt.textContent=list[i].name.length>35?list[i].name.slice(0,35)+'…':list[i].name;opt.title=list[i].name+'\n'+list[i].date;opt.className='custom-snippet';sel.add(opt);}
  }
}

// ── DATA/RESULT MANIPULATION ──
// Data operations: work on raw rows. Result operations: reorder data then recalculate.
function getRows(target){var rowDelim=interpret($('rowDelim').value);return splitBy($('txt'+target).value,rowDelim,rowDelimiterIsRegex).clean(trimFields);}
function setRows(target,rows){var rowDelim=interpret($('rowDelim').value);$('txt'+target).value=rows.join(rowDelim);if(target==='Data')auto();}

function sortControl(target){var rows=getRows(target);showCount(target,rows.length);rows.sort(function(a,b){var na=isNaN(a),nb=isNaN(b);if(!na&&!nb)return a-b;if(na&&nb){a=a.toLowerCase();b=b.toLowerCase();return a<b?-1:a>b?1:0;}return na?1:-1;});setRows(target,rows);}
function sortData(){sortControl('Data');}
function sortResult(){sortData();}

function sortControlByCol(target){var col=parseInt(prompt(t('sortPrompt'),'0'),10);if(isNaN(col)||col<0)return;var fieldDelim=interpret($('fieldDelim').value);var rows=getRows(target);showCount(target,rows.length);rows.sort(function(a,b){var af=a.split(fieldDelim),bf=b.split(fieldDelim),av=(af[col]||'').trim(),bv=(bf[col]||'').trim(),na=isNaN(av),nb=isNaN(bv);if(!na&&!nb)return av-bv;if(na&&nb){av=av.toLowerCase();bv=bv.toLowerCase();return av<bv?-1:av>bv?1:0;}return na?1:-1;});setRows(target,rows);}
function sortDataByCol(){sortControlByCol('Data');}
function sortResultByCol(){sortDataByCol();}

function invertControl(target){var rows=getRows(target);showCount(target,rows.length);setRows(target,rows.reverse());}
function invertData(){invertControl('Data');}
function invertResult(){invertData();}

function shuffleControl(target){var rows=getRows(target);showCount(target,rows.length);rows.sort(function(){return 0.5-Math.random();});setRows(target,rows);}
function shuffleData(){shuffleControl('Data');}
function shuffleResult(){shuffleData();}

function removeDuplicatesControl(target){var rows=getRows(target),uniques=rows.unique();showCount(target,uniques.length,rows.length);setRows(target,uniques);}
function removeDataDuplicates(){removeDuplicatesControl('Data');}
function removeResultDuplicates(){removeDataDuplicates();}
function downloadResult(){var text=$('txtResults').value,blob=new Blob([text],{type:'text/plain'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dataweave_results.txt';a.click();URL.revokeObjectURL(a.href);}
function exportProject(){
  var project={
    v:1,
    data:$('txtData').value,
    pattern:$('txtPattern').value,
    col:$('fieldDelim').value,
    row:$('rowDelim').value,
    csv:csvMode,
    colRx:columnDelimiterIsRegex,
    rowRx:rowDelimiterIsRegex
  };
  var json=JSON.stringify(project,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var ts=new Date().toISOString().replace(/:/g,'-').replace(/\..+/,'');
  a.download='dataweave_'+ts+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importProject(input){
  var file=input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var project=JSON.parse(e.target.result);
      if(project.data!==undefined)$('txtData').value=project.data;
      if(project.pattern!==undefined)$('txtPattern').value=project.pattern;
      if(project.col!==undefined)$('fieldDelim').value=project.col;
      if(project.row!==undefined)$('rowDelim').value=project.row;
      if(project.csv!==undefined){csvMode=project.csv;$('chkCsvMode').checked=csvMode;}
      if(project.colRx!==undefined){columnDelimiterIsRegex=project.colRx;$('chkColRegex').checked=columnDelimiterIsRegex;}
      if(project.rowRx!==undefined){rowDelimiterIsRegex=project.rowRx;$('chkRowRegex').checked=rowDelimiterIsRegex;}
      go();
    }catch(err){alert('匯入失敗：'+err.message);}
  };
  reader.readAsText(file);
  input.value='';
}
function copyResult(){
  var text=$('txtResults').value;
  if(!text){return;}
  navigator.clipboard.writeText(text).then(function(){
    var btn=$('copyBtn');
    btn.textContent=t('copiedLabel');
    setTimeout(function(){btn.textContent=t('copyLabel');},1500);
  }).catch(function(){
    var ta=$('txtResults');
    ta.select();ta.setSelectionRange(0,99999);
    document.execCommand('copy');
    var btn=$('copyBtn');
    btn.textContent=t('copiedLabel');
    setTimeout(function(){btn.textContent=t('copyLabel');},1500);
  });
}

'技巧':'<h3>嵌入 JavaScript</h3><p>用 <code>&lt;% ... %&gt;</code> 包住任何 JS 表達式即可執行。</p><pre>&lt;% if ($rownum != 0) { \'AND \'; } %&gt;\n→ 除了第一列外都輸出 "AND "</pre><pre>&lt;% if ($rownumOne != $numrows) { \',\'; } %&gt;\n→ 除了最後一列外都輸出逗號</pre><pre>&lt;% $0.toUpperCase() %&gt;\n→ 把第 0 欄轉大寫</pre><h3>結果排序 / 去重</h3><p>Result 面板的排序、反轉、隨機、去重是<b>先對來源資料操作，再重新計算</b>，因此不會破壞多行 pattern 的結構。</p><h3>快捷鍵</h3><table><tr><td><code>F5</code></td><td>計算</td></tr><tr><td><code>Ctrl+E</code></td><td>計算</td></tr><tr><td><code>Ctrl+Enter</code></td><td>計算</td></tr></table><h3>分隔符祕技</h3><table><tr><td><code>\\t</code></td><td>Tab 字元</td></tr><tr><td><code>\\n</code></td><td>換行（Unix / macOS）</td></tr><tr><td><code>\\r\\n</code></td><td>CRLF 換行（Windows）</td></tr><tr><td><code>,</code></td><td>逗號（CSV）</td></tr></table><h3>Pattern 結構</h3><pre>$ONCE  ← 標頭（只出現一次）\n$EACH   ← 每列重複\n$ONCE  ← 結尾（只出現一次）\n$EACH   ← 另一個重複區塊\n$EACH+  ← 重複但略過第一列</pre><h3>儲存</h3><p>按 <b>💾 儲存</b> 將 pattern 存到瀏覽器儲存空間。已存的 pattern 會出現在 snippet 下拉選單及 <b>📂 載入</b> 彈窗中。按 <b>📤 匯出</b> / <b>📥 匯入</b> 可備份/還原整個專案為 JSON 檔。</p><p style="font-size:0.85em;opacity:0.5;">本工具致敬 <a href="https://nimbletext.com" target="_blank">NimbleText</a>，日期函式庫取自 Steven Levithan。</p>'
}};

function showHelp(){
  var existing=document.getElementById('helpOverlay');if(existing){existing.parentNode.removeChild(existing);return;}
  var overlay=document.createElement('div');overlay.id='helpOverlay';overlay.className='overlay';
  overlay.onclick=function(e){if(e.target===overlay)overlay.parentNode.removeChild(overlay);};
  var modal=document.createElement('div');modal.className='modal';
  modal.innerHTML='<div class="modal-header"><h2>'+t('helpTitle')+'</h2><button class="modal-close">&times;</button></div><div class="help-tabs" id="helpTabs"></div><div class="modal-body" id="helpBody"></div>';
  overlay.appendChild(modal);document.body.appendChild(overlay);
  modal.querySelector('.modal-close').onclick=function(){overlay.parentNode.removeChild(overlay);};

  var currentLang='zh';
  function renderTabs(lang){
    var tabs=document.getElementById('helpTabs'),body=document.getElementById('helpBody');
    tabs.innerHTML='';
    var tabData=HELP_TABS["zh"];
    Object.keys(tabData).forEach(function(name,idx){
      var tab=document.createElement('button');tab.className='help-tab'+(idx===0?' active':'');tab.textContent=name;
      tab.onclick=function(){tabs.querySelectorAll('.help-tab').forEach(function(t){t.classList.remove('active');});tab.classList.add('active');body.innerHTML=tabData[name];};
      tabs.appendChild(tab);
    });
    body.innerHTML=tabData[Object.keys(tabData)[0]];
  }

  modal.querySelectorAll('.lang-btn').forEach(function(btn){
    btn.onclick=function(){
      modal.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      currentLang=btn.dataset.lang;
      renderTabs(currentLang);
    };
  });

  renderTabs(currentLang);
}

// ── RESIZE ──
function initResize(){
  document.querySelectorAll('.resize-handle').forEach(function(handle){
    var prev=handle.previousElementSibling,next=handle.nextElementSibling,startY,prevH,nextH;
    handle.addEventListener('mousedown',function(e){
      e.preventDefault();startY=e.clientY;prevH=prev.offsetHeight;nextH=next.offsetHeight;
      document.body.style.cursor='ns-resize';document.body.style.userSelect='none';
      function onMove(e2){var dy=e2.clientY-startY,newPrev=Math.max(80,prevH+dy),newNext=prevH+nextH-newPrev;if(newNext<80){newPrev=prevH+nextH-80;newNext=80;}prev.style.flex='0 0 '+newPrev+'px';next.style.flex='0 0 '+newNext+'px';}
      function onUp(){document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);document.body.style.cursor='';document.body.style.userSelect='';}
      document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
    });
  });
}

// ── STATE SETTERS ──
function setColumnDelimiterIsRegex(v){
  columnDelimiterIsRegex=v;
  if(v&&csvMode){csvMode=false;$('chkCsvMode').checked=false;}
  auto();
}
function setRowDelimiterIsRegex(v){rowDelimiterIsRegex=v;auto();}
function setCsvMode(v){
  csvMode=v;
  if(v&&columnDelimiterIsRegex){columnDelimiterIsRegex=false;$('chkColRegex').checked=false;}
  auto();
}

// ── KEYBOARD ──
document.addEventListener('keydown',function(e){
  if(e.key==='F5'||(e.ctrlKey&&e.key==='e')||(e.ctrlKey&&e.key==='Enter')){e.preventDefault();go();}
});

// ── INIT ──
function init(){
  try{var sl=localStorage.getItem('dataweave_lang');if(sl&&L10N[sl])currentLang=sl;}catch(e){}
  loadQueryString();
  if(!$('txtData').value)$('txtData').value=defaultText;
  if(!$('txtPattern').value)$('txtPattern').value=defaultPattern;
  $('rowDelim').value=unterpret(detectNativeDelimiter());
  refreshSnippetDropdown();initResize();
  document.querySelectorAll('.lang-switch').forEach(function(b){b.classList.toggle('active',b.dataset.lang===currentLang);});
  applyL10N();ready=true;go();
}
window.addEventListener('DOMContentLoaded',init);
</script>
